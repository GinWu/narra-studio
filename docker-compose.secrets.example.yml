# Optional Docker secrets override.
#
# Usage:
#   cp secrets/README.md secrets/README.local.md
#   printf '%s' "$OPENAI_API_KEY" > secrets/openai_api_key
#   printf '%s' "$DASHSCOPE_API_KEY" > secrets/dashscope_api_key
#   docker compose -f docker-compose.yml -f docker-compose.secrets.example.yml up --build
#
# This file intentionally is not required by the default compose profile so the
# studio can start without real provider credentials. Do not mount secrets
# into the web service.

services:
  api:
    secrets:
      - openai_api_key
      - elevenlabs_api_key
      - dashscope_api_key
      - fal_key
      - replicate_api_token

  worker:
    secrets:
      - openai_api_key
      - elevenlabs_api_key
      - dashscope_api_key
      - fal_key
      - replicate_api_token

secrets:
  openai_api_key:
    file: ./secrets/openai_api_key
  elevenlabs_api_key:
    file: ./secrets/elevenlabs_api_key
  dashscope_api_key:
    file: ./secrets/dashscope_api_key
  fal_key:
    file: ./secrets/fal_key
  replicate_api_token:
    file: ./secrets/replicate_api_token
